<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Emergency | GPM Relief</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #555; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .report-card {
            background: white; 
            padding: 30px; 
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            border-left: 8px solid #ff4d4d;
            width: 100%;
            max-width: 450px;
        }
    </style>
</head>
<body>

<div class="report-card">
    <h2 class="fw-bold mb-3">Report Disaster</h2>
    
    <form id="reportForm">
        <div class="mb-3">
            <label class="form-label">Location in Tenkasi District</label>
            <input type="text" name="location" id="locInput" class="form-control" placeholder="Street/Village Name" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Severity Level</label>
            <select name="severity" id="sevInput" class="form-select">
                <option value="Critical">Critical (Immediate Rescue)</option>
                <option value="High">High (Food/Medical Needed)</option>
                <option value="Medium">Medium (Water/Supplies)</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Description of Situation</label>
            <textarea name="description" id="descInput" class="form-control" rows="3" required></textarea>
        </div>

        <button type="submit" id="subBtn" class="btn btn-danger w-100 fw-bold mb-3">Submit Report</button>

        <button type="button" onclick="window.location.href='./index.html'" class="btn btn-outline-secondary w-100 fw-bold">
            ← Back to Dashboard
        </button>
    </form>



    <div id="status" class="mt-3 text-center small"></div>
</div>

<script>
    const focusInput = () => {
        const input = document.getElementById('locInput');
        if (input) input.focus();
    };

    window.onload = focusInput;

    const scriptURL = 'https://script.google.com/macros/s/AKfycbwcO-QW3soMmsjEwdPNC01g7hoEhl7zONgpgyTd1I_oOClG1JDEEB9TJ09NWXblO2Qr/exec';
    
    document.getElementById('reportForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        const statusDiv = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Notifying Admin...';

        // Collect data as a clean JSON object
        const payload = {
            location: document.getElementById('locInput').value,
            severity: document.getElementById('sevInput').value,
            description: document.getElementById('descInput').value
        };

        try {
            // Using POST with JSON body for maximum reliability
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', // Essential for Google Apps Script redirects
                body: JSON.stringify(payload)
            });

            // Since 'no-cors' doesn't return a result, we assume success if no error is thrown
            statusDiv.innerHTML = `
                <div class='alert alert-success animate__animated animate__fadeIn'>
                    ✅ <b>SOS SENT!</b><br>Admin notified via email & data logged.
                </div>`;
            e.target.reset();
            setTimeout(focusInput, 500);
        } catch (error) {
            statusDiv.innerHTML = "<div class='alert alert-danger'>❌ Error connecting to server.</div>";
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Report";
        }
    });
</script>
</body>
</html>
