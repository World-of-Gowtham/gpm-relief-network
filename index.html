<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | GPM Donations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&q=80') no-repeat center center fixed; 
            background-size: cover; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Poppins', sans-serif; 
        }
        .auth-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
            border-top: 5px solid #ff4d4d;
        }
        .btn-primary { background: #ff4d4d; border: none; padding: 12px; font-weight: bold; transition: 0.3s; }
        .btn-primary:hover { background: #e63939; transform: translateY(-2px); }
        .admin-link { 
            margin-top: 20px; 
            padding-top: 15px; 
            border-top: 1px solid #eee; 
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="text-center fw-bold mb-2" style="color: #ff4d4d;">GPM Donations</h2>
        <p class="text-center text-muted small mb-4">Secure Login for Emergency Alerts</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" id="pass" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 shadow-sm">Login to Dashboard</button>
            
            <div class="text-center mt-3 small">
                <span>New here? <a href="register.html" class="text-decoration-none text-danger fw-bold">Create Account</a></span><br>
                <a href="#" onclick="handleForgotPassword()" class="text-muted text-decoration-none small">Forgot Password?</a>
            </div>
        </form>

        <div class="admin-link text-center">
            <p class="text-muted mb-1">Staff Member?</p>
            <button onclick="goToAdmin()" class="btn btn-outline-secondary btn-sm px-4 rounded-pill">Admin Command Center</button>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwcO-QW3soMmsjEwdPNC01g7hoEhl7zONgpgyTd1I_oOClG1JDEEB9TJ09NWXblO2Qr/exec';

    // Redirect to Admin Page
    function goToAdmin() {
        // You can add a password prompt here if you want extra security
        // let pass = prompt("Enter Admin Security Code:");
        // if(pass === "1234") { window.location.href = "admin.html"; }
        window.location.href = "admin.html"; 
    }

    window.onload = () => { document.getElementById('email').focus(); };

    function handleForgotPassword() {
        const email = prompt("Enter your registered email:");
        if (email) {
            alert("Checking database...");
            fetch(`${scriptURL}?action=forgotPassword&email=${encodeURIComponent(email)}`)
                .then(res => res.text())
                .then(result => alert(result))
                .catch(err => alert("Server error."));
        }
    }

    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;

        btn.disabled = true;
        btn.innerText = "Verifying...";

        fetch(`${scriptURL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`)
            .then(response => response.text())
            .then(result => {
                if (result.trim() === "Success") {
                    localStorage.setItem('currentUserEmail', email);
                    window.location.href = "dashboard.html";
                } else {
                    alert("Invalid Credentials");
                    btn.disabled = false;
                    btn.innerText = "Login to Dashboard";
                    document.getElementById('email').focus(); 
                }
            })
            .catch(error => {
                alert("Connection error.");
                btn.disabled = false;
                btn.innerText = "Login to Dashboard";
            });
    };
</script>
</body>
</html>
