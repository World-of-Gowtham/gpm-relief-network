<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Impact | GPM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; margin: 0; padding: 0; }
        
        /* The header container */
        .impact-header { 
            background: #ff4d4d; 
            color: white; 
            padding: 50px 0; 
            margin-bottom: 30px; 
            position: relative; /* This is key for the button position */
        }

        /* The Back Button - Styled to be clearly visible */
        .back-btn {
            position: absolute; 
            top: 25px; 
            left: 25px; 
            background: white; 
            color: #ff4d4d; 
            border: none; 
            padding: 8px 18px; 
            cursor: pointer; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 14px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .back-btn:hover {
            background: #eeeeee;
            transform: scale(1.05);
        }

        .stat-card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
    </style>
</head>
<body>

<div class="impact-header text-center">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">
        ← Back
    </button>
    
    <h1 class="fw-bold">My Helping Hand</h1>
    <p id="userMailDisplay" class="opacity-75">...</p>
</div>

<div class="container">
    <div class="row mb-4 justify-content-center">
        <div class="col-md-4">
            <div class="stat-card">
                <h6 class="text-muted">Total Donated</h6>
                <h2 class="fw-bold text-danger">₹<span id="totalAmount">0</span></h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <h6 class="text-muted">Requests Reported</h6>
                <h2 class="fw-bold text-primary" id="reportCount">0</h2>
            </div>
        </div>
    </div>

    <div class="bg-white p-4 rounded-4 shadow-sm mb-5">
        <h4 class="fw-bold mb-3">Recent Donations</h4>
        <table class="table">
            <thead>
                <tr>
                    <th>NGO</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="donationTable">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Get current user email from local storage
    const email = localStorage.getItem('currentUserEmail') || "guest@gpm.com";
    document.getElementById('userMailDisplay').innerText = email;

    // 2. Load data from local storage
    function loadProfile() {
        const history = JSON.parse(localStorage.getItem('donationHistory') || "[]");
        const donationTable = document.getElementById('donationTable');
        const totalAmountDisplay = document.getElementById('totalAmount');
        
        let total = 0;
        let tableRows = "";

        if (history.length === 0) {
            donationTable.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No donations found yet.</td></tr>';
            return;
        }

        history.forEach(item => {
            total += parseInt(item.amount);
            tableRows += `
                <tr>
                    <td>${item.ngo}</td>
                    <td>₹${item.amount}</td>
                    <td>${new Date(item.date).toLocaleDateString()}</td>
                    <td><span class="badge bg-success">Verified</span></td>
                </tr>`;
        });

        totalAmountDisplay.innerText = total;
        donationTable.innerHTML = tableRows;
    }

    // Initialize the profile
    loadProfile();
</script>
</body>
</html>
