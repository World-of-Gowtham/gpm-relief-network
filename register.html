<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - Smart Donation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            /* Using your local image register.png as background */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('register.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 0;
        }

        .reg-form { 
            /* Glass-morphism effect: White with transparency */
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(8px);
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 { color: #333; font-weight: 700; }
        .form-label { font-weight: 600; color: #444; }
        
        .btn-primary {
            background-color: #ff4d4d; /* Matching your GPM Red theme */
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #e63939;
            transform: translateY(-2px);
        }

        input.form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5 reg-form">
            <h2 class="text-center mb-4">Create Account</h2>
            <form id="registrationForm">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="phone" class="form-control" placeholder="+91..." required>
                </div>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">District</label>
                        <input type="text" name="district" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">State</label>
                        <input type="text" name="state" class="form-control" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mt-2">Register Now</button>
            </form>
            <div id="responseMessage" class="mt-3 text-center fw-bold"></div>
            <p class="text-center mt-3 mb-0 small">Already have an account? <a href="login.html" class="text-danger">Login here</a></p>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwcO-QW3soMmsjEwdPNC01g7hoEhl7zONgpgyTd1I_oOClG1JDEEB9TJ09NWXblO2Qr/exec';     
    const form = document.getElementById('registrationForm');
    const msg = document.getElementById('responseMessage');

    form.addEventListener('submit', e => {
        e.preventDefault();
        msg.innerHTML = "Processing Registration...";
        msg.style.color = "#ff4d4d";
        
        let formData = new FormData(form);
        let params = new URLSearchParams(formData);
        params.append('action', 'userRegister');

        fetch(`${scriptURL}?${params.toString()}`)
            .then(response => response.text())
            .then(data => {
                if(data.trim() === "Success") {
                    msg.innerHTML = "✅ Registration Successful!";
                    msg.style.color = "green";
                    form.reset();
                    // Redirect to login after 2 seconds
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    msg.innerHTML = "❌ Error: " + data;
                    msg.style.color = "red";
                }
            })
            .catch(error => {
                msg.innerHTML = "❌ Network Error! Check Deployment.";
                msg.style.color = "red";
            });
    });
</script>

</body>
</html>
